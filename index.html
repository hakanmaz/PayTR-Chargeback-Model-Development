  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f2aec28a-0deb-452a-a3b6-ad22b2cc2b23\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{background:#e9edee;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:#16242b}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:max-content;padding:48px;background:#e9edee;\">\n\n  <!-- ===== HEADER ===== -->\n  <div style=\"width:1235px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n        <div style=\"width:22px;height:22px;background:#0F4761;border-radius:5px;\"><\u002Fdiv>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:0.16em;color:#3f5560;\">MINDBERG.AI&nbsp;&nbsp;×&nbsp;&nbsp;PAYTR<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-size:27px;font-weight:700;letter-spacing:-0.01em;color:#0F4761;line-height:1.15;\">PAYTR Üye İşyeri Risk Skorlama Modeli<\u002Fh1>\n      <p style=\"font-size:16px;font-weight:500;color:#43585f;margin-top:5px;\">Canlıya Alma Proje Planı · Mindberg.ai Tarafından Sunulacak Hizmetler<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"text-align:right;padding-bottom:4px;\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:0.12em;color:#7c8d94;margin-bottom:6px;\">PROJE TAKVİMİ<\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;color:#16242b;\">{{ rangeLabel }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#5d7079;margin-top:3px;\">{{ totalLabel }} · başlangıç bugün ({{ todayLabel }})<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== CHART CARD ===== -->\n  <div style=\"width:1235px;background:#ffffff;border:1px solid #d4dbde;border-radius:12px;overflow:hidden;box-shadow:0 6px 24px rgba(15,71,97,0.08);display:flex;\">\n\n    <!-- ---- LEFT PANEL ---- -->\n    <div style=\"width:500px;flex:none;border-right:2px solid #0F4761;\">\n      <!-- header -->\n      <div style=\"height:30px;background:#0F4761;display:flex;align-items:center;padding-left:16px;\">\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;color:#bcd3de;\">PROJE İŞ KALEMLERİ<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:28px;background:#f1f5f6;border-bottom:1px solid #dde4e7;display:grid;grid-template-columns:46px 212px 86px 78px 78px;align-items:center;\">\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.06em;color:#5d7079;text-align:center;\">#<\u002Fspan>\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.08em;color:#5d7079;padding-left:4px;\">FAZ / HİZMET<\u002Fspan>\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.06em;color:#5d7079;text-align:center;\">SÜRE<\u002Fspan>\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.06em;color:#5d7079;text-align:right;padding-right:10px;\">BAŞLANGIÇ<\u002Fspan>\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.06em;color:#5d7079;text-align:right;padding-right:14px;\">BİTİŞ<\u002Fspan>\n      <\u002Fdiv>\n      <!-- rows -->\n      <sc-for list=\"{{ tasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <div style=\"height:72px;border-bottom:1px solid #edf1f2;display:grid;grid-template-columns:46px 212px 86px 78px 78px;align-items:center;\">\n          <span style=\"font-size:15px;font-weight:700;color:#aebcc2;text-align:center;\">{{ t.no }}<\u002Fspan>\n          <div style=\"padding-left:4px;padding-right:10px;\">\n            <div style=\"font-size:9px;font-weight:700;letter-spacing:0.07em;color:#9aa9af;margin-bottom:3px;\">RİSK SKORLAMA MODELİ<\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:#1b2a31;line-height:1.25;\">{{ t.name }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <span style=\"display:inline-block;font-size:12px;font-weight:700;color:#0F4761;background:#e7eef1;border-radius:20px;padding:3px 10px;\">{{ t.durLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-size:12.5px;font-weight:600;color:#34474e;text-align:right;padding-right:10px;\">{{ t.startStr }}<\u002Fspan>\n          <span style=\"font-size:12.5px;font-weight:600;color:#34474e;text-align:right;padding-right:14px;\">{{ t.endStr }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- ---- RIGHT (TIMELINE) PANEL ---- -->\n    <div style=\"flex:none;width:735px;position:relative;\">\n      <!-- month band -->\n      <div style=\"height:30px;display:flex;background:#0F4761;\">\n        <sc-for list=\"{{ segs }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <div style=\"width:{{ s.px }}px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.16);\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:0.04em;color:#ffffff;\">{{ s.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- week ticks -->\n      <div style=\"height:28px;display:flex;background:#f1f5f6;border-bottom:1px solid #dde4e7;\">\n        <sc-for list=\"{{ weeks }}\" as=\"w\" hint-placeholder-count=\"15\">\n          <div style=\"width:49px;flex:none;display:flex;align-items:center;justify-content:center;border-right:1px solid #e2e8ea;\">\n            <span style=\"font-size:9.5px;font-weight:600;color:#6a7d84;\">{{ w.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- body -->\n      <div style=\"position:relative;height:{{ bodyH }}px;background-image:repeating-linear-gradient(to right,#eef2f3 0px,#eef2f3 1px,transparent 1px,transparent 49px),repeating-linear-gradient(to bottom,transparent 0px,transparent 71px,#edf1f2 71px,transparent 72px);\">\n\n        <!-- today line -->\n        <sc-if value=\"{{ todayInRange }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;top:0;bottom:0;left:{{ todayLeft }}px;width:0;border-left:2px dashed #C8503B;z-index:4;\"><\u002Fdiv>\n          <div style=\"position:absolute;top:6px;left:{{ todayLeft }}px;transform:translateX(-50%);background:#C8503B;color:#fff;font-size:9px;font-weight:700;letter-spacing:0.05em;padding:2px 7px;border-radius:20px;white-space:nowrap;z-index:5;\">BUGÜN<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- task bars -->\n        <sc-for list=\"{{ tasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"position:absolute;left:0;right:0;top:{{ t.rowTop }}px;height:72px;\">\n            <sc-if value=\"{{ t.isBar }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:absolute;top:23px;left:{{ t.barLeft }}px;width:{{ t.barWidth }}px;height:26px;background:#0F4761;border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(15,71,97,0.28);\">\n                <span style=\"color:#ffffff;font-size:11.5px;font-weight:600;letter-spacing:0.02em;\">{{ t.durLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ t.isMilestone }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:absolute;top:29px;left:{{ t.msLeft }}px;\">\n                <div style=\"width:15px;height:15px;background:#C6803A;transform:translateX(-50%) rotate(45deg);box-shadow:0 1px 3px rgba(120,70,20,0.35);\"><\u002Fdiv>\n                <span style=\"position:absolute;left:12px;top:0px;white-space:nowrap;font-size:11px;font-weight:700;color:#9a6321;\">{{ t.durLabel }} · Mutabakat<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== LEGEND ===== -->\n  <div style=\"width:1235px;display:flex;align-items:center;gap:28px;margin-top:16px;padding-left:2px;\">\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <div style=\"width:26px;height:13px;background:#0F4761;border-radius:3px;\"><\u002Fdiv>\n      <span style=\"font-size:12.5px;color:#43585f;font-weight:500;\">Faz / Çalışma süresi<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <div style=\"width:13px;height:13px;background:#C6803A;transform:rotate(45deg);\"><\u002Fdiv>\n      <span style=\"font-size:12.5px;color:#43585f;font-weight:500;\">Kilometre taşı (sunum &amp; mutabakat)<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <div style=\"width:0;height:15px;border-left:2px dashed #C8503B;\"><\u002Fdiv>\n      <span style=\"font-size:12.5px;color:#43585f;font-weight:500;\">Bugün<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-left:auto;font-size:11.5px;color:#8493999;color:#7c8d94;font-style:italic;\">Fazlar ardışıktır; her faz bir öncekinin tamamlanmasıyla başlar.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== NOTES ===== -->\n  <sc-if value=\"{{ showDescriptions }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"width:1235px;margin-top:30px;background:#ffffff;border:1px solid #d4dbde;border-radius:12px;padding:26px 30px;\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:0.1em;color:#0F4761;margin-bottom:18px;\">AÇIKLAMALAR &amp; BAĞIMLILIKLAR<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px 40px;\">\n        <sc-for list=\"{{ tasks }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:14px;\">\n            <div style=\"flex:none;width:30px;height:30px;border-radius:7px;background:#e7eef1;color:#0F4761;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;\">{{ t.no }}<\u002Fdiv>\n            <div>\n              <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:5px;\">\n                <span style=\"font-size:14px;font-weight:700;color:#1b2a31;\">{{ t.name }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:600;color:#7c8d94;\">{{ t.rangeStr }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:12.5px;line-height:1.55;color:#4a5d64;text-wrap:pretty;\">{{ t.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px;padding-top:16px;border-top:1px solid #edf1f2;font-size:11.5px;line-height:1.5;color:#7c8d94;text-wrap:pretty;\">{{ footnote }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1330,&quot;height&quot;:920},&quot;startDate&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2026-06-24&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showDescriptions&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const MS = 86400000;\n    const monthsLong = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];\n    const monthsShort = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];\n    const parse = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };\n    const add = (d,n) => new Date(d.getTime() + n*MS);\n    const off = (d,base) => Math.round((d.getTime() - base.getTime())/MS);\n    const sShort = (d) => d.getDate() + ' ' + monthsShort[d.getMonth()];\n    const sFull = (d) => d.getDate() + ' ' + monthsShort[d.getMonth()] + ' ' + d.getFullYear();\n\n    const startDate = this.props.startDate ?? '2026-06-24';\n    const showDescriptions = this.props.showDescriptions ?? true;\n    const start = parse(startDate);\n\n    // --- iş günü (hafta içi) yardımcıları ---\n    const isWeekend = (d) => { const g = d.getDay(); return g === 0 || g === 6; };\n    const nextBiz = (d) => { let x = add(d,1); while (isWeekend(x)) x = add(x,1); return x; };\n    const firstBiz = (d) => { let x = new Date(d); while (isWeekend(x)) x = add(x,1); return x; };\n    const endBiz = (s, n) => { let e = new Date(s); let rem = n - 1; while (rem > 0) { e = nextBiz(e); rem--; } return e; };\n\n    const raw = [\n      { name:'Veri Analizi ve Hedef Değişken Opsiyonlarının Belirlenmesi', durLabel:'5 Hafta', bdays:25, type:'bar',\n        desc:'Belirtilen 5 haftalık (25 iş günü) süre, PAYTR tarafından Mindberg.ai\\u2019a, skorlama modelini geliştirme sürecinde kullanılabilecek tüm veri setlerine, bu verilerle ilgili açıklamalara ve Mindberg.ai\\u2019ın kullanacağı veri bilimi yazılım ve kütüphanelerine erişiminin ardından başlar.' },\n      { name:'Model Geliştirme', durLabel:'5 Hafta', bdays:25, type:'bar',\n        desc:'Hedef Değişken Opsiyonları üzerinde PAYTR ile mutabakatın ardından başlar.' },\n      { name:'Modelin Sunumu ve Mutabakat', durLabel:'1 Gün', bdays:1, type:'milestone',\n        desc:'Mindberg.ai tarafından farklı hedef değişkenler üzerinde geliştirilen modeller sunulur ve nihai modele karar verilir.' },\n      { name:'Skorlama Yazılımının Hazırlanması ve Teslimi', durLabel:'4 Hafta', bdays:20, type:'bar',\n        desc:'Bu çalışma, nihai modele karar verilmesinin ardından başlayabilir ve PAYTR sistemlerine entegrasyonu için PAYTR ve Mindberg.ai ekiplerinin ortak eforu gerekmektedir.' },\n    ];\n\n    // ardışık planlama — iş günleri üzerinden, hafta sonları atlanır\n    let cursor = firstBiz(start);\n    const sched = raw.map((t,i) => {\n      const s = new Date(cursor);\n      const e = endBiz(s, t.bdays);\n      cursor = nextBiz(e);\n      return { ...t, idx:i, no:String(i+1).padStart(2,'0'), start:s, end:e };\n    });\n\n    const firstStart = sched[0].start;\n    const lastEnd = sched[sched.length-1].end;\n\n    // timeline bounds: Monday before first start .. Sunday after last end\n    const back = (firstStart.getDay() + 6) % 7;\n    const tStart = add(firstStart, -back);\n    const fwd = (7 - lastEnd.getDay()) % 7; // days to Sunday\n    const tEnd = add(lastEnd, fwd);\n    const totalDays = off(tEnd, tStart) + 1;\n    const DAY_PX = 7;\n\n    const tasks = sched.map(t => ({\n      no: t.no,\n      name: t.name,\n      durLabel: t.durLabel,\n      desc: t.desc,\n      startStr: sShort(t.start),\n      endStr: sShort(t.end),\n      rangeStr: sShort(t.start) + ' – ' + sShort(t.end),\n      isBar: t.type === 'bar',\n      isMilestone: t.type === 'milestone',\n      barLeft: off(t.start, tStart) * DAY_PX,\n      barWidth: (off(t.end, tStart) - off(t.start, tStart) + 1) * DAY_PX,\n      msLeft: off(t.start, tStart) * DAY_PX + Math.round(DAY_PX/2),\n      rowTop: t.idx * 72,\n    }));\n\n    // weeks\n    const weeks = [];\n    for (let d = new Date(tStart); d <= tEnd; d = add(d, 7)) {\n      weeks.push({ label: sShort(d) });\n    }\n\n    // month segments\n    const segs = [];\n    let c = new Date(tStart);\n    while (c <= tEnd) {\n      const y = c.getFullYear(), m = c.getMonth();\n      const monthEnd = new Date(y, m+1, 0);\n      const segEnd = monthEnd < tEnd ? monthEnd : tEnd;\n      const days = off(segEnd, c) + 1;\n      segs.push({ label: monthsLong[m], px: days * DAY_PX });\n      c = add(segEnd, 1);\n    }\n\n    // today\n    const now = new Date();\n    const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n    const todayInRange = todayMid >= tStart && todayMid <= tEnd;\n    const todayLeft = off(todayMid, tStart) * DAY_PX;\n\n    const totalProjectDays = off(lastEnd, firstStart) + 1;\n    const totalBiz = sched.reduce((a,t) => a + t.bdays, 0);\n\n    return {\n      tasks, weeks, segs,\n      bodyH: tasks.length * 72,\n      todayInRange, todayLeft,\n      showDescriptions,\n      rangeLabel: sFull(firstStart) + ' – ' + sFull(lastEnd),\n      totalLabel: Math.round(totalBiz/5) + ' iş haftası · ' + totalBiz + ' iş günü',\n      todayLabel: sFull(todayMid),\n      footnote: 'Tarihler, başlangıç olarak bugün (' + sFull(todayMid) + ') alınarak iş günleri (hafta içi) üzerinden hesaplanmıştır; hafta sonları (Cmt–Paz) süreye dâhil edilmemiştir. 5 Hafta = 25 iş günü, 4 Hafta = 20 iş günü olarak alınmıştır. Her faz, bir önceki fazın tamamlanmasını izleyen ilk iş gününde başlar; resmî tatiller ve PAYTR kaynaklı veri/erişim gecikmeleri başlangıç tarihlerini öteleyebilir.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
